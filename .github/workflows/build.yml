name: Build xnbt.so

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28'

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25c
          add-to-path: true

      - name: Build
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          chmod +x build.sh
          ./build.sh release arm64-v8a

      - name: Package
        run: |
          mkdir -p artifact
          cp build/arm64-v8a-release/xnbt.so artifact/
          cp manifest.json artifact/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xnbt-mod
          path: artifact/
          retention-days: 30
